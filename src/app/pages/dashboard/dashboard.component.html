<div class="header bg-gradient-eco pb-8 pt-md-6">
  <div class="container-fluid">
    <div class="header-body">
      <div class="mb-4">
        <ng-container *ngIf="!loading && !errorMsg; else loadingOrError">
          <app-stats-pie-card [data]="stats"></app-stats-pie-card>
        </ng-container>

        <ng-template #loadingOrError>
          <div class="card card-stats">
            <div class="card-body">
              <ng-container *ngIf="loading">
                <span class="text-muted">Carregando estatísticas...</span>
              </ng-container>
              <ng-container *ngIf="!loading && errorMsg">
                <span class="text-danger">{{ errorMsg }}</span>
              </ng-container>
            </div>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>
<div class="container-fluid mt--7">
  <div class="row mb-4">
    <div class="col-12">
      <app-urban-degradation-map
        [title]="'Mapa de sustentabilidade urbana'"
        [center]="[-8.762, -63.9039]"
        [zoom]="13"
        (addNew)="onAddNewPoint()"
        (reportLocationSelected)="onReportLocationSelected($event)"
        [reportPoints]="reports">
      </app-urban-degradation-map>
    </div>
  </div>



<!-- Overlay do popup -->
<div class="zip-overlay" *ngIf="showZip" (click)="closeZip()">
  <div class="zip-dialog" (click)="$event.stopPropagation()">
    <button class="zip-close" (click)="closeZip()">✕</button>
    <app-zip-uploader></app-zip-uploader>
  </div>
</div>

<div class="zip-overlay" *ngIf="isReporting" (click)="closeReportModal()">
  <div class="zip-dialog report-dialog" (click)="$event.stopPropagation()">
    <button class="zip-close" (click)="closeReportModal()">✕</button>
    <h4 class="zip-title text-left">Nova denúncia colaborativa</h4>

    <div class="form-group text-left">
      <label>Localização selecionada no mapa</label>
      <div class="location-box" *ngIf="newReport.latitude; else noLocation">
        {{ newReport.latitude | number:'1.6-6' }}, {{ newReport.longitude | number:'1.6-6' }}
      </div>
      <ng-template #noLocation>
        <div class="location-box muted">Clique no mapa para selecionar o local da denúncia.</div>
      </ng-template>
    </div>

    <div class="form-group text-left">
      <label>Foto do local</label>
      <input class="form-control" type="file" accept="image/*" (change)="handleFileInput($event)">
      <div class="preview-wrap mt-3" *ngIf="imagePreview">
        <img [src]="imagePreview" alt="Pré-visualização" class="preview-image">
        <div class="preview-actions">
          <button class="btn btn-outline-secondary btn-sm" type="button" (click)="removeSelectedFile()">Remover</button>
          <button class="btn btn-success btn-sm" type="button" (click)="analyzeImage()" [disabled]="analyzing">{{ analyzing ? 'Analisando...' : 'Mock: gerar descrição' }}</button>
        </div>
      </div>
    </div>

    <div class="form-group text-left">
      <label>Descrição</label>
      <textarea class="form-control" rows="5" [(ngModel)]="newReport.description" placeholder="Descreva o tipo de resíduo, quantidade e referência do local"></textarea>
    </div>

    <button class="btn btn-primary btn-block" type="button" (click)="submitReport()" [disabled]="submitting || !newReport.latitude || !newReport.description.trim()">
      {{ submitting ? 'Enviando...' : 'Enviar denúncia' }}
    </button>
  </div>
</div>

<div class="image-overlay" *ngIf="zoomedImage" (click)="zoomedImage = null">
  <img [src]="zoomedImage" alt="Zoom da imagem" class="zoomed-image" (click)="$event.stopPropagation()">
</div>
